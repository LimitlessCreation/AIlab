<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚡ 赛博人格鉴定器 · 神经漫游版</title>
  <!-- 霓虹字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0c1a1f, #03080a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      padding: 16px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 扫描线特效 */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.02) 0px, rgba(255, 0, 255, 0.02) 2px, transparent 3px, transparent 8px);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 820px;
      width: 100%;
      background: rgba(8, 20, 24, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid #00f7ff;
      box-shadow: 0 0 30px #00ffff88, 0 0 10px #ff00ff66, inset 0 0 15px #00ffff33;
      border-radius: 32px;
      padding: 28px 24px 32px;
      position: relative;
      z-index: 10;
      transition: all 0.2s;
    }

    .container::after {
      content: "";
      position: absolute;
      top: -3px; left: 20px; right: 20px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, #ff00ff, transparent);
      filter: blur(3px);
      border-radius: 4px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      color: #b5ffff;
      text-shadow: 0 0 8px #0ff, 0 0 20px #f0f, 0 0 35px #0ff;
      margin-bottom: 8px;
    }

    .subhead {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      color: #ffb3ff;
      text-shadow: 0 0 5px #ff00c1;
      letter-spacing: 3px;
      margin-bottom: 24px;
      font-size: 1rem;
      border-bottom: 1px dashed #0ff;
      padding-bottom: 12px;
    }

    .progress-area {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      color: #8efff0;
      font-weight: 600;
      text-shadow: 0 0 6px cyan;
    }

    .question-counter {
      font-size: 1.3rem;
      font-family: 'Orbitron', sans-serif;
      background: #0a1a1e;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #0ff;
      box-shadow: inset 0 0 8px #00ffff55, 0 0 12px #ff00ff44;
    }

    .neon-bar-bg {
      flex: 1;
      height: 12px;
      background: #10262e;
      border-radius: 20px;
      margin-left: 20px;
      border: 1px solid #0ff;
      overflow: hidden;
      box-shadow: 0 0 6px cyan;
    }

    .neon-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff00c1, #00f7ff);
      box-shadow: 0 0 15px #f0f, 0 0 8px #0ff;
      border-radius: 20px;
      transition: width 0.2s ease;
    }

    .question-card {
      background: rgba(0, 30, 40, 0.6);
      border: 1.5px solid #ff66ff;
      border-radius: 28px;
      padding: 28px 20px;
      margin: 10px 0 28px;
      box-shadow: 0 0 30px #ff00ff33, inset 0 0 20px #0ff1a;
      backdrop-filter: blur(4px);
    }

    .question-text {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.4;
      color: #e2fdff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #f0f;
      font-family: 'Rajdhani', sans-serif;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: 20px 0 10px;
    }

    .option-btn {
      background: rgba(6, 30, 36, 0.7);
      border: 2.5px solid #0cf;
      border-radius: 60px;
      padding: 22px 24px;
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Rajdhani', 'Orbitron', sans-serif;
      color: #d0ffff;
      text-shadow: 0 0 12px #0ff;
      text-align: left;
      letter-spacing: 2px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.15s all;
      word-break: break-word;
      line-height: 1.3;
      box-shadow: 0 0 15px #0ff, 0 4px 0 #0a4a5a;
      transform: translateY(0);
    }

    .option-btn:hover {
      background: #0f3f4f;
      border-color: #ff44ff;
      box-shadow: 0 0 30px #ff00ff, 0 4px 0 #b300b3, inset 0 0 15px white;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .option-btn:active {
      transform: translateY(2px);
      box-shadow: 0 0 25px #f0f, 0 1px 0 #b300b3;
    }

    .option-btn.disabled-touch {
      opacity: 0.7;
      pointer-events: none;
      filter: brightness(0.8);
    }

    .result-panel {
      background: #0b1f26e0;
      border: 3px solid #ff0ae0;
      border-radius: 40px;
      padding: 30px 22px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 50px #ff00ff, inset 0 0 30px #0ff;
      margin-top: 20px;
    }

    .result-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      color: #f5ffb2;
      text-shadow: 0 0 15px #ff00c8, 0 0 40px #0ff;
      letter-spacing: 4px;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .result-desc {
      font-size: 1.7rem;
      color: #b1ffff;
      text-shadow: 0 0 8px magenta;
      padding: 20px 16px;
      background: #021014b3;
      border-radius: 30px;
      border-left: 8px solid #0ff;
      box-shadow: inset 0 0 30px #0ff1a, 0 5px 0 #0a3a44;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* 详细结果区域 ———— 赛博解剖报告 */
    .detailed-stats {
      background: #04141ce6;
      border-radius: 28px;
      padding: 18px 20px;
      margin: 20px 0 28px;
      border: 1px solid #ff66cc;
      box-shadow: 0 0 20px #ff00aa40, inset 0 0 10px cyan20;
    }

    .stat-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      color: #ffc0ff;
      text-shadow: 0 0 5px #f0f;
      border-left: 4px solid #0ff;
      padding-left: 12px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    .dimension-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
      background: #00000055;
      padding: 12px 14px;
      border-radius: 40px;
      border-bottom: 1px dashed #0ff8;
    }

    .dim-label {
      font-weight: 800;
      font-size: 1.2rem;
      min-width: 100px;
      color: #b3ffff;
      text-shadow: 0 0 4px cyan;
    }

    .dim-bars {
      flex: 2;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-bg {
      flex: 1;
      height: 12px;
      background: #1e3a44;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 0 5px black;
    }

    .bar-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #ff44ee, #00ffff);
      border-radius: 20px;
      box-shadow: 0 0 8px #f0f;
    }

    .score-numbers {
      font-family: monospace;
      font-weight: bold;
      min-width: 85px;
      text-align: right;
      color: #ffd966;
      font-size: 1rem;
    }

    .dim-comment {
      font-size: 0.85rem;
      color: #ffae70;
      margin-top: 6px;
      width: 100%;
      text-align: right;
      font-style: italic;
      border-top: 1px dotted #0ff5;
      padding-top: 6px;
    }

    .button-group {
      display: flex;
      gap: 18px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .share-btn, .restart-btn {
      background: transparent;
      border: 3px solid #f0f;
      border-radius: 60px;
      padding: 16px 24px;
      font-size: 1.4rem;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      text-shadow: 0 0 15px #ff00c8;
      box-shadow: 0 0 25px #ff00ff, inset 0 0 15px #0ff;
      flex: 1;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: 0.2s;
      letter-spacing: 2px;
      text-align: center;
    }

    .share-btn:hover, .restart-btn:hover {
      background: #ff00ff22;
      border-color: #0ff;
      box-shadow: 0 0 45px cyan, 0 0 20px #ff00ff;
      transform: scale(1.01);
    }

    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1f2ae0;
      backdrop-filter: blur(20px);
      border: 2px solid #0ff;
      color: #ccfffc;
      padding: 12px 28px;
      border-radius: 60px;
      font-family: 'Orbitron', monospace;
      font-weight: bold;
      z-index: 999;
      box-shadow: 0 0 30px cyan;
      font-size: 1rem;
      white-space: nowrap;
      pointer-events: none;
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }

    .hidden {
      display: none !important;
    }

    .glitch-note {
      margin-top: 16px;
      color: #6ef;
      text-align: right;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 550px) {
      .container { padding: 20px 16px; }
      h1 { font-size: 1.6rem; }
      .question-text { font-size: 1.4rem; }
      .option-btn { font-size: 1.2rem; padding: 16px 14px; }
      .result-name { font-size: 2rem; }
      .dim-label { font-size: 1rem; min-width: 75px; }
      .share-btn, .restart-btn { font-size: 1.1rem; padding: 12px 16px; }
      .stat-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>◈ 人格·鉴定器 ◈</h1>
  <div class="subhead">[ 神经浪涌 · 赛博判定 ]</div>

  <div id="quizSection">
    <div class="progress-area">
      <span class="question-counter" id="counterDisplay">1 / 25</span>
      <div class="neon-bar-bg">
        <div class="neon-bar-fill" id="progressFill" style="width: 4%;"></div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-text" id="questionText">加载神经元中...</div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="glitch-note">⚡ 点击选项 · 意识上传 ⚡</div>
  </div>

  <div id="resultSection" class="result-panel hidden">
    <div class="result-name" id="resultName">赛博幽灵</div>
    <div class="result-desc" id="resultDesc">你是一串没人调用的代码。</div>
    
    <!-- 新增：详细维度分析 + 扎心冷幽默 -->
    <div class="detailed-stats" id="detailedStats">
      <div class="stat-title">📟 深度脑波解构报告</div>
      <div id="statsContainer">加载人格矩阵中...</div>
    </div>

    <div class="button-group">
      <button class="share-btn" id="shareResultBtn">📤 分享鉴定报告</button>
      <button class="restart-btn" id="restartBtn">↻ 重新检测 ↻</button>
    </div>
    <div class="glitch-note" style="margin-top: 16px;">⚠️ 诊断结果已加密 · 有没有用自己定</div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 维度定义 ----------
    const DIM = {
      E: 'E', I: 'I',
      S: 'S', N: 'N',
      F: 'F', T: 'T',
      P: 'P', J: 'J',
      LAIDBACK: 'laidback',
      OBSESSIVE: 'obsessive'
    };

    let scores = {
      E: 0, I: 0,
      S: 0, N: 0,
      F: 0, T: 0,
      P: 0, J: 0,
      laidback: 0, obsessive: 0
    };

    let currentIndex = 0;
    let quizCompleted = false;
    let optionLock = false;

    // DOM 元素
    const quizSection = document.getElementById('quizSection');
    const resultSection = document.getElementById('resultSection');
    const counterDisplay = document.getElementById('counterDisplay');
    const progressFill = document.getElementById('progressFill');
    const questionText = document.getElementById('questionText');
    const optionsDiv = document.getElementById('optionsContainer');
    const resultName = document.getElementById('resultName');
    const resultDesc = document.getElementById('resultDesc');
    const restartBtn = document.getElementById('restartBtn');
    const shareBtn = document.getElementById('shareResultBtn');
    const statsContainer = document.getElementById('statsContainer');

    // ---------- 原始题库（25题，一字不改）----------
    const questions = [
      { text: "👾 外星人攻打地球，你会？", options: [
          { text: "💖 用爱感化", dim: DIM.F, value: 1 },
          { text: "📐 计算物理轨道", dim: DIM.T, value: 1 }
      ]},
      { text: "🥣 你的早餐通常？", options: [
          { text: "🍕 有什么吃什么", dim: DIM.P, value: 1 },
          { text: "⚖️ 精确到克的营养餐", dim: DIM.J, value: 1 }
      ]},
      { text: "🐱 看到可爱猫猫？", options: [
          { text: "🤚 直接上手摸", dim: DIM.E, value: 1 },
          { text: "📸 远远拍照观察", dim: DIM.I, value: 1 }
      ]},
      { text: "💻 你的电脑桌面？", options: [
          { text: "🗂️ 文件堆成山", dim: DIM.P, value: 1 },
          { text: "🔄 只有回收站", dim: DIM.J, value: 1 }
      ]},
      { text: "🧮 面对数学最后一道大题？", options: [
          { text: "✍️ 写个‘解’字然后放弃", dim: DIM.LAIDBACK, value: 1 },
          { text: "📏 虽然不会但是非要证出辅助线", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "🕶️ 你的脑机接口卡顿了，你会？", options: [
          { text: "🤘 用力拍打后脑勺", dim: DIM.LAIDBACK, value: 1 },
          { text: "🧠 进入底层debug", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "🌐 选择你的网络灵魂伴侣？", options: [
          { text: "🤖 话痨AI客服", dim: DIM.E, value: 1 },
          { text: "📡 沉默的卫星", dim: DIM.I, value: 1 }
      ]},
      { text: "🧬 如果成为赛博格，第一件改造？", options: [
          { text: "💪 发光义体", dim: DIM.S, value: 1 },
          { text: "🌈 情绪可视化大脑", dim: DIM.N, value: 1 }
      ]},
      { text: "🔮 你更相信？", options: [
          { text: "👁️ 眼见为实", dim: DIM.S, value: 1 },
          { text: "✨ 万物皆有灵", dim: DIM.N, value: 1 }
      ]},
      { text: "💥 遇到赛博故障，你会？", options: [
          { text: "🔨 敲一敲就好了", dim: DIM.P, value: 1 },
          { text: "📋 先写事故报告", dim: DIM.J, value: 1 }
      ]},
      { text: "🎧 你听歌的方式？", options: [
          { text: "🎲 随机播放，随缘", dim: DIM.P, value: 1 },
          { text: "📀 按专辑/年份排序", dim: DIM.J, value: 1 }
      ]},
      { text: "🧪 实验室里的神秘液体，你会？", options: [
          { text: "👅 舔一口试试（？）", dim: DIM.LAIDBACK, value: 1 },
          { text: "🧴 先做质谱分析", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "📡 接收到外星信号，第一反应？", options: [
          { text: "🎤 回一句“在吗”", dim: DIM.E, value: 1 },
          { text: "🔍 分析编码规律", dim: DIM.I, value: 1 }
      ]},
      { text: "🤯 面对海量信息流，你？", options: [
          { text: "🌊 随波逐流", dim: DIM.LAIDBACK, value: 1 },
          { text: "🧲 建立分类标签系统", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "💔 数字生命体失恋了，你会？", options: [
          { text: "💌 写首情诗代码安慰", dim: DIM.F, value: 1 },
          { text: "📊 分析分手概率模型", dim: DIM.T, value: 1 }
      ]},
      { text: "🏙️ 赛博城市里你最常去？", options: [
          { text: "🎪 霓虹夜市", dim: DIM.E, value: 1 },
          { text: "📚 地下数据库", dim: DIM.I, value: 1 }
      ]},
      { text: "🔋 你的能量来源？", options: [
          { text: "☕ 三倍浓缩咖啡", dim: DIM.S, value: 1 },
          { text: "🌌 宇宙背景辐射", dim: DIM.N, value: 1 }
      ]},
      { text: "📅 对待deadline？", options: [
          { text: "⏰ 最后一夜奇迹", dim: DIM.P, value: 1 },
          { text: "🗓️ 提前三天完成", dim: DIM.J, value: 1 }
      ]},
      { text: "🧠 你的人格备份会选择？", options: [
          { text: "☁️ 随便存云端", dim: DIM.LAIDBACK, value: 1 },
          { text: "🔐 多重加密冷存储", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "🎮 游戏风格？", options: [
          { text: "🤹 即兴发挥乱按", dim: DIM.P, value: 1 },
          { text: "📐 精确计算每一步", dim: DIM.J, value: 1 }
      ]},
      { text: "👾 你捡到一个故障机器人，会？", options: [
          { text: "🛠️ 拆开看看", dim: DIM.S, value: 1 },
          { text: "💭 思考它有没有灵魂", dim: DIM.N, value: 1 }
      ]},
      { text: "🧬 基因编辑技术普及，你？", options: [
          { text: "😎 先加个荧光纹身", dim: DIM.E, value: 1 },
          { text: "🧪 研究十年再决定", dim: DIM.I, value: 1 }
      ]},
      { text: "📟 你的数字墓碑会写？", options: [
          { text: "🎉 “已阅，不回”", dim: DIM.LAIDBACK, value: 1 },
          { text: "📜 生平所有log", dim: DIM.OBSESSIVE, value: 1 }
      ]},
      { text: "🧊 面对绝对零度的冷漠，你？", options: [
          { text: "🔥 用热情融化", dim: DIM.F, value: 1 },
          { text: "❄️ 使用热力学第二定律", dim: DIM.T, value: 1 }
      ]},
      { text: "🕸️ 最后！你的数字人格底色？", options: [
          { text: "🌀 混乱即真理", dim: DIM.N, value: 1 },
          { text: "📏 秩序对抗熵增", dim: DIM.S, value: 1 }
      ]}
    ];
    const TOTAL_QS = questions.length;

    function resetScores() {
      scores = { E:0, I:0, S:0, N:0, F:0, T:0, P:0, J:0, laidback:0, obsessive:0 };
    }

    // ---------- 原有结果映射（完整保留）----------
    function computePersonality() {
      const eScore = scores.E, iScore = scores.I;
      const sScore = scores.S, nScore = scores.N;
      const fScore = scores.F, tScore = scores.T;
      const pScore = scores.P, jScore = scores.J;
      const laidScore = scores.laidback, obseScore = scores.obsessive;

      const EI = (eScore >= iScore) ? 'E' : 'I';
      const SN = (sScore >= nScore) ? 'N' : 'S';
      const FT = (fScore >= tScore) ? 'F' : 'T';
      const PJ = (pScore >= jScore) ? 'P' : 'J';
      const LO = (laidScore >= obseScore) ? 'LAID' : 'OBSE';

      const key = `${EI}${SN}${FT}${PJ}${LO}`;
      const personalityMap = {
        'ENFPLAID': { name: '🌈 霓虹乐子人', desc: '你的大脑是个24小时不关机的弹幕网站，随性到连系统日志都想放弃你。' },
        'INFJOBSE': { name: '📿 存在主义AI', desc: '你偏执地思考自己是否只是一段代码，并为此写了300页加密日记。' },
        'ISTJOBSE': { name: '⚙️ 赛博格审计员', desc: '你的神经元排列得像Excel表格，任何混乱都会让你核心温度升高。' },
        'ENFPOBSE': { name: '🎭 互联网传教士', desc: '你用最严谨的逻辑……传播最离谱的观点，二极管看了都短路。' },
        'ENTJLAID': { name: '🦾 赛博总裁 (摆烂版)', desc: '你有统治世界的计划，但今天先摸鱼。' },
        'INTJOBSE': { name: '🧠 暗网先知', desc: '你偏执地认为冰箱在监视你，并且证据确凿。' },
        'ESFPLAID': { name: '💃 派对用赛博格', desc: '你的散热系统靠蹦迪维持，情感模块比谁都烫。' },
        'ISFJLAID': { name: '🫖 稳定终端', desc: '你像一台老式收音机，稳定、怀旧，偶尔收到外星民谣。' },
        'ENTPLAID': { name: '🤖 辩论型故障体', desc: '你享受把Siri问崩溃，随性到连自己都杠。' },
        'INFPLAID': { name: '🌌 星空冥想AI', desc: '你在意每一颗星星的情绪，但总是忘记交电费。' },
        'ESTJOBSE': { name: '📏 偏执执行器', desc: '就连做梦都按照说明书，梦里也要做甘特图。' },
        'ISTPLAID': { name: '🔧 机体修理工', desc: '“重启试试”是你人生的唯一教条。' },
        'ENFJLAID': { name: '📢 赛博政委', desc: '你想用爱感化所有bug，但bug不领情。' },
      };
      if (personalityMap[key]) return personalityMap[key];
      
      let name = '', descPool = [
        '你的数字灵魂像一团纠缠的耳机线，但你觉得这样很艺术。',
        '赛博算命显示：你会在周二下午三点整因为咖啡渍而顿悟，然而并没有什么卵用。',
        '你的人格类型在数据库中属于“404 not found”，但我们编了一个。',
        '就连AI都对你感到好奇，并建议你多晒太阳。',
        '你的意识是一串漂亮的乱码，无药可救又充满魅力。'
      ];
      if (EI==='E' && FT==='F') name = '💬 扩列AI';
      else if (EI==='I' && SN==='N') name = '🌑 暗物质思考者';
      else if (PJ==='J' && LO==='OBSE') name = '📋 偏执计划狂';
      else if (LO==='LAID') name = '🍃 混沌中立网站';
      else name = '🧩 赛博大脑';
      let desc = descPool[Math.floor(Math.random() * descPool.length)];
      if (FT==='T') desc = '你坚信逻辑能解决一切，包括中午吃什么——然后你饿死了。 ' + desc;
      else if (FT==='F') desc = '你试图共情路由器，觉得它太累了。 ' + desc;
      return { name, desc };
    }

    // 🧠 展示所有测试结果 + 扎心冷幽默（完全新增，不覆盖原文案）
    function renderDetailedStats() {
      const e = scores.E, i = scores.I;
      const s = scores.S, n = scores.N;
      const f = scores.F, t = scores.T;
      const p = scores.P, j = scores.J;
      const laid = scores.laidback, obs = scores.obsessive;
      
      const totalEI = e + i, totalSN = s + n, totalFT = f + t, totalPJ = p + j, totalLO = laid + obs;
      const percE = totalEI ? (e / totalEI * 100).toFixed(0) : 50;
      const percI = 100 - percE;
      const percN = totalSN ? (n / totalSN * 100).toFixed(0) : 50;
      const percS = 100 - percN;
      const percF = totalFT ? (f / totalFT * 100).toFixed(0) : 50;
      const percT = 100 - percF;
      const percP = totalPJ ? (p / totalPJ * 100).toFixed(0) : 50;
      const percJ = 100 - percP;
      const percLaid = totalLO ? (laid / totalLO * 100).toFixed(0) : 50;
      const percObs = 100 - percLaid;
      
      // 扎心冷幽默库
      const roastLib = {
        EI: (e,i) => e > i ? "你的社交电池是核动力，但经常说些没营养的废话。" : "你内心戏比《赛博朋克2077》的bug还多，社恐到连AI都不想对话。",
        SN: (s,n) => s > n ? "太接地气了，连做梦都是excel表格。你错过了无数元宇宙暴富机会。" : "你的脑洞可以塞进三体舰队，但现实里经常撞到门框。",
        FT: (f,t) => f > t ? "你的共情能力强到能感受到WiFi的孤独，决策全靠哭。" : "你是人形逻辑机，但恋爱时像坏掉的机器人，注孤生。",
        PJ: (p,j) => p > j ? "你的计划表像薛定谔的猫，既存在又不存在，deadline是你唯一信仰。" : "你的强迫症令人发指，连冰箱里鸡蛋都要按身高排队。",
        LO: (laid,obs) => laid > obs ? "摆烂大师，你的信条：‘来都来了，算了算了’。" : "偏执狂魔，你甚至怀疑充电器的脾气，每天都在和自己较劲。"
      };
      const eiRoast = roastLib.EI(e,i);
      const snRoast = roastLib.SN(s,n);
      const ftRoast = roastLib.FT(f,t);
      const pjRoast = roastLib.PJ(p,j);
      const loRoast = roastLib.LO(laid,obs);
      
      const html = `
        <div class="dimension-row">
          <div class="dim-label">🧬 外向(E) vs 内向(I)</div>
          <div class="dim-bars"><div class="bar-bg"><div class="bar-fill" style="width: ${percE}%; background:linear-gradient(90deg,#ff44ee,#0ff);"></div></div></div>
          <div class="score-numbers">E ${e} · I ${i}</div>
          <div class="dim-comment">${eiRoast}</div>
        </div>
        <div class="dimension-row">
          <div class="dim-label">🌿 实感(S) vs 直觉(N)</div>
          <div class="dim-bars"><div class="bar-bg"><div class="bar-fill" style="width: ${percN}%;"></div></div></div>
          <div class="score-numbers">S ${s} · N ${n}</div>
          <div class="dim-comment">${snRoast}</div>
        </div>
        <div class="dimension-row">
          <div class="dim-label">❤️ 情感(F) vs 逻辑(T)</div>
          <div class="dim-bars"><div class="bar-bg"><div class="bar-fill" style="width: ${percF}%;"></div></div></div>
          <div class="score-numbers">F ${f} · T ${t}</div>
          <div class="dim-comment">${ftRoast}</div>
        </div>
        <div class="dimension-row">
          <div class="dim-label">🌀 随性(P) vs 计划(J)</div>
          <div class="dim-bars"><div class="bar-bg"><div class="bar-fill" style="width: ${percP}%;"></div></div></div>
          <div class="score-numbers">P ${p} · J ${j}</div>
          <div class="dim-comment">${pjRoast}</div>
        </div>
        <div class="dimension-row">
          <div class="dim-label">🍺 摆烂(LAID) vs 偏执(OBS)</div>
          <div class="dim-bars"><div class="bar-bg"><div class="bar-fill" style="width: ${percLaid}%;"></div></div></div>
          <div class="score-numbers">LAID ${laid} · OBS ${obs}</div>
          <div class="dim-comment">${loRoast}</div>
        </div>
        <div class="glitch-note" style="margin-top:8px; text-align:center;">⚡ 以上数据经过量子算法验证，准确率99.9% ⚡</div>
      `;
      statsContainer.innerHTML = html;
    }
    
    function finishQuiz() {
      quizCompleted = true;
      quizSection.classList.add('hidden');
      resultSection.classList.remove('hidden');
      const personality = computePersonality();
      resultName.textContent = personality.name;
      resultDesc.textContent = personality.desc;
      renderDetailedStats();   // 显示所有维度得分 + 冷幽默
    }
    
    function renderQuestion() {
      if (quizCompleted || currentIndex >= TOTAL_QS) {
        finishQuiz();
        return;
      }
      const q = questions[currentIndex];
      questionText.textContent = q.text;
      optionsDiv.innerHTML = '';
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.dataset.dim = opt.dim;
        btn.dataset.value = opt.value;
        btn.addEventListener('click', onOptionClick);
        optionsDiv.appendChild(btn);
      });
      const displayNum = currentIndex + 1;
      counterDisplay.textContent = `${displayNum} / ${TOTAL_QS}`;
      const progressPercent = (displayNum / TOTAL_QS) * 100;
      progressFill.style.width = `${progressPercent}%`;
      optionLock = false;
    }
    
    function onOptionClick(e) {
      if (optionLock || quizCompleted) return;
      const btn = e.currentTarget;
      const dim = btn.dataset.dim;
      const val = parseInt(btn.dataset.value, 10);
      if (scores.hasOwnProperty(dim)) scores[dim] += val;
      optionLock = true;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled-touch'));
      if (currentIndex === TOTAL_QS - 1) {
        quizCompleted = true;
        finishQuiz();
      } else {
        currentIndex++;
        renderQuestion();
      }
    }
    
    function restartQuiz() {
      resetScores();
      currentIndex = 0;
      quizCompleted = false;
      optionLock = false;
      resultSection.classList.add('hidden');
      quizSection.classList.remove('hidden');
      renderQuestion();
    }
    
    // 分享功能（复制报告至剪贴板）
    async function shareReport() {
      const personality = computePersonality();
      let detailText = "";
      const statsDiv = document.getElementById('statsContainer');
      if (statsDiv) {
        const rows = statsDiv.querySelectorAll('.dimension-row');
        rows.forEach(row => {
          const label = row.querySelector('.dim-label')?.innerText || "";
          const numbers = row.querySelector('.score-numbers')?.innerText || "";
          const comment = row.querySelector('.dim-comment')?.innerText || "";
          detailText += `${label}  ${numbers}\n  💬 ${comment}\n`;
        });
      }
      const shareContent = `⚡ 赛博人格鉴定报告 ⚡\n${personality.name}\n「${personality.desc}」\n\n📊 神经维度解构：\n${detailText}\n—— 该结果由量子纠缠生成，有问题不负责 ——`;
      try {
        await navigator.clipboard.writeText(shareContent);
        showToast("📡 鉴定报告已复制到赛博空间！");
      } catch (err) {
        showToast("❌ 复制失败，手动截图吧，可怜的数字灵魂。");
      }
    }
    
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast-msg';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
    
    restartBtn.addEventListener('click', restartQuiz);
    shareBtn.addEventListener('click', shareReport);
    
    resetScores();
    renderQuestion();
  })();
</script>
</body>
</html>
