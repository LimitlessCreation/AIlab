<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 AI 编程实验室</title>

    <!-- CodeMirror 编辑器 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js">
    </script>

    <style>
        :root {
            --bg-primary: #1a1b26;
            --bg-secondary: #1f2133;
            --bg-tertiary: #282a3a;
            --bg-input: #1c1e2e;
            --border: #2e3045;
            --text-primary: #c9d1d9;
            --text-secondary: #8b8fa3;
            --text-bright: #e6edf3;
            --accent: #7c5cfc;
            --accent-hover: #6a4de6;
            --accent-glow: rgba(124, 92, 252, 0.3);
            --success: #3fb950;
            --warning: #d2991d;
            --error: #f85149;
            --info: #58a6ff;
            --radius: 10px;
            --radius-sm: 6px;
            --radius-xs: 4px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            --font-sans: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ 顶部导航栏 ============ */
        .navbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
            min-height: 50px;
        }
        .navbar .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #7c5cfc, #a78bfa, #58a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .navbar .divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            border-radius: 1px;
            flex-shrink: 0;
        }
        .navbar .experiment-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .navbar .spacer {
            flex: 1;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: var(--font-sans);
            transition: all var(--transition);
            white-space: nowrap;
            outline: none;
            letter-spacing: 0.2px;
        }
        .btn:hover {
            background: #32344a;
            border-color: #4a4d65;
        }
        .btn:active {
            transform: scale(0.97);
            transition: 0.08s;
        }
        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-accent:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 0 28px var(--accent-glow);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.78rem;
            border-radius: var(--radius-xs);
        }
        .btn-icon {
            width: 34px;
            height: 34px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.1rem;
        }
        .btn-active {
            background: #3a3d55 !important;
            border-color: var(--accent) !important;
            box-shadow: inset 0 0 0 1px var(--accent);
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: #2d3148;
            color: var(--accent);
            border: 1px solid #3d3360;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        .status-dot.ready {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ============ 主体布局 ============ */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ============ 左侧模板面板 ============ */
        .sidebar {
            width: 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all var(--transition);
            overflow: hidden;
        }
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        .sidebar-header {
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-list::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-list::-webkit-scrollbar-thumb {
            background: #3a3d55;
            border-radius: 2px;
        }
        .template-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            transition: all var(--transition);
            border: 1px solid transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
        }
        .template-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-bright);
            border-color: #3a3d55;
        }
        .template-item.active {
            background: #2a2848;
            color: #c4b5fd;
            border-color: #4a3d70;
            font-weight: 500;
            box-shadow: inset 0 0 0 1px rgba(124, 92, 252, 0.25);
        }
        .template-item .icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* ============ 中央编辑区 ============ */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            background: var(--bg-primary);
        }
        .editor-tabs {
            display: flex;
            gap: 2px;
            padding: 6px 10px 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .editor-tab {
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-bottom: none;
            transition: all var(--transition);
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .editor-tab:hover {
            color: var(--text-bright);
            background: #25273b;
        }
        .editor-tab.active {
            background: var(--bg-primary);
            color: var(--text-bright);
            border-color: var(--border);
            font-weight: 600;
        }
        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .editor-wrapper .CodeMirror {
            height: 100% !important;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
        }
        .cm-editor-tag {
            position: absolute;
            top: 8px;
            right: 16px;
            z-index: 10;
            pointer-events: none;
            font-size: 0.7rem;
            color: #555;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        /* ============ 右侧面板 ============ */
        .right-panel {
            width: 380px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .right-panel.collapsed {
            width: 0;
            border-left: none;
            overflow: hidden;
        }
        .right-panel-header {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .right-panel-header .tab-btn {
            flex: 1;
            padding: 7px 12px;
            cursor: pointer;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: var(--radius-xs);
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            transition: all var(--transition);
            letter-spacing: 0.3px;
        }
        .right-panel-header .tab-btn:hover {
            color: var(--text-bright);
            background: #25273b;
        }
        .right-panel-header .tab-btn.active {
            background: #2a2848;
            color: #c4b5fd;
            border-color: #4a3d70;
        }
        .right-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .right-content .pane {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .right-content .pane.visible {
            display: flex;
        }

        /* 预览区 */
        .preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
            border-radius: 0;
        }
        .preview-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 20px;
            opacity: 0.7;
        }

        /* 控制台 */
        .console-output {
            flex: 1;
            background: #0d0e17;
            color: #c9d1d9;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
            border-radius: 0;
        }
        .console-output::-webkit-scrollbar {
            width: 4px;
        }
        .console-output::-webkit-scrollbar-thumb {
            background: #3a3d55;
            border-radius: 2px;
        }
        .console-line {
            padding: 2px 0;
            border-bottom: 1px solid #1a1b26;
        }
        .console-line.log {
            color: #c9d1d9;
        }
        .console-line.warn {
            color: #d2991d;
        }
        .console-line.error {
            color: #f85149;
        }
        .console-line.info {
            color: #58a6ff;
        }
        .console-line.success {
            color: #3fb950;
        }

        /* AI 聊天区 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #3a3d55;
            border-radius: 2px;
        }
        .chat-msg {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.82rem;
            line-height: 1.55;
            animation: fadeInUp 0.3s ease;
            letter-spacing: 0.15px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .chat-msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 450;
        }
        .chat-msg.ai {
            align-self: flex-start;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .chat-msg.ai .ai-label {
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-bright);
            font-size: 0.82rem;
            font-family: var(--font-sans);
            outline: none;
            transition: all var(--transition);
            letter-spacing: 0.2px;
        }
        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .chat-send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
        .chat-send-btn:active {
            transform: scale(0.9);
        }
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 12px 0;
        }
        .quick-chip {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 14px;
            cursor: pointer;
            background: #25273b;
            color: var(--text-secondary);
            border: 1px solid #333550;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .quick-chip:hover {
            background: #303350;
            color: var(--text-bright);
            border-color: #555;
        }

        /* ============ 底部状态栏 ============ */
        .statusbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 5px 14px;
            background: #161723;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            min-height: 28px;
            letter-spacing: 0.3px;
        }
        .statusbar .spacer {
            flex: 1;
        }

        /* ============ Toast 提示 ============ */
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2d3148;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.82rem;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s ease;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            letter-spacing: 0.2px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: var(--success);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.25);
        }
        .toast.error {
            border-color: var(--error);
            box-shadow: 0 0 20px rgba(248, 81, 73, 0.25);
        }

        /* ============ 响应式 ============ */
        @media (max-width: 900px) {
            .sidebar {
                width: 160px;
                font-size: 0.75rem;
            }
            .right-panel {
                width: 300px;
            }
            .navbar .experiment-title {
                display: none;
            }
            .navbar .divider {
                display: none;
            }
        }
        @media (max-width: 640px) {
            .sidebar {
                display: none;
            }
            .right-panel {
                width: 100%;
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                box-shadow: var(--shadow);
            }
            .right-panel.collapsed {
                width: 0;
            }
            .editor-panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航 ==================== -->
    <nav class="navbar">
        <span class="logo">🔬 编程实验室</span>
        <span class="divider"></span>
        <span class="experiment-title" id="experimentTitle">Hello World</span>
        <span class="badge" id="modeBadge">JS</span>
        <span class="spacer"></span>
        <span class="status-dot ready" title="就绪"></span>
        <span style="font-size:0.75rem;color:var(--text-secondary);">就绪</span>
        <button class="btn btn-sm" id="btnToggleSidebar" title="切换模板面板">📁 模板</button>
        <button class="btn btn-accent" id="btnRun" title="运行代码 (Ctrl+Enter)">▶ 运行</button>
        <button class="btn btn-sm" id="btnToggleRight" title="切换右侧面板">📐 面板</button>
        <button class="btn btn-sm" id="btnClearConsole" title="清空控制台">🧹</button>
    </nav>

    <!-- ==================== 主体 ==================== -->
    <div class="main-container">
        <!-- 左侧模板面板 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">📚 实验模板</div>
            <div class="sidebar-list" id="templateList">
                <!-- JS动态填充 -->
            </div>
        </aside>

        <!-- 中央编辑器 -->
        <div class="editor-panel" id="editorPanel">
            <div class="editor-tabs" id="editorTabs">
                <span class="editor-tab active" data-tab="html">HTML</span>
                <span class="editor-tab" data-tab="css">CSS</span>
                <span class="editor-tab" data-tab="js">JavaScript</span>
            </div>
            <div class="editor-wrapper" id="editorWrapper">
                <!-- CodeMirror 将挂载到这里 -->
            </div>
        </div>

        <!-- 右侧面板 -->
        <aside class="right-panel" id="rightPanel">
            <div class="right-panel-header">
                <button class="tab-btn active" data-pane="preview">👁 预览</button>
                <button class="tab-btn" data-pane="console">📟 控制台</button>
                <button class="tab-btn" data-pane="ai">🤖 AI 助手</button>
            </div>
            <div class="right-content">
                <!-- 预览窗格 -->
                <div class="pane visible" id="panePreview">
                    <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin" title="预览"></iframe>
                </div>
                <!-- 控制台窗格 -->
                <div class="pane" id="paneConsole">
                    <div class="console-output" id="consoleOutput">
                        <div class="console-line info">🟢 控制台就绪。运行代码以查看输出。</div>
                    </div>
                </div>
                <!-- AI 助手窗格 -->
                <div class="pane" id="paneAI">
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-msg ai">
                                <div class="ai-label">🤖 AI 编程助手</div>
                                你好！我是你的AI编程助手。我可以帮你：<br>
                                • 🔍 <b>解释代码</b> — 分析当前编辑器中的代码<br>
                                • 🐛 <b>调试帮助</b> — 找出潜在问题<br>
                                • 💡 <b>优化建议</b> — 改进代码质量<br>
                                • 📖 <b>概念讲解</b> — 回答编程问题<br><br>
                                试试点击下方的快捷按钮，或直接向我提问！
                            </div>
                        </div>
                        <div class="quick-actions" id="quickActions">
                            <span class="quick-chip" data-q="解释一下当前代码">🔍 解释代码</span>
                            <span class="quick-chip" data-q="帮我检查这段代码有什么bug">🐛 检查Bug</span>
                            <span class="quick-chip" data-q="如何优化当前代码的性能？">💡 优化建议</span>
                            <span class="quick-chip" data-q="JavaScript闭包是什么？">📖 闭包概念</span>

            for (let j = 0; j < n - i - 1; j++) {
              steps++;
              if (arr[j] > arr[j + 1]) {
                [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];

            }
          }
          return { sorted: arr, steps };
        }

            // 劫持console方法
            function createConsoleCapture() {
                const originalConsole = {};
                const methods = ['log', 'warn', 'error', 'info'];
                methods.forEach(m => {
                    originalConsole[m] = console[m];
                });
                return {
                    capture: () => {
                        methods.forEach(m => {
                            console[m] = function(...args) {
                                appendConsole(m === 'warn' ? 'warn' : m === 'error' ? 'error' : m ===
                                    'info' ? 'info' : 'log', ...args);
                                originalConsole[m].apply(console, args);

                    return explainConcept('object');
                }
                if (questionLower.includes('递归') || questionLower.includes('recursion')) {
                    return explainConcept('recursion');
                }
                if (questionLower.includes('算法') || questionLower.includes('排序')) {
                    return explainConcept('algorithm');
                }

                // 通用回复
                return generateGeneralResponse(userQuestion, code);
            }

            function analyzeCode(code, lineCount) {
                let response = `📝 **代码分析**（共 ${lineCount} 行）<br><br>`;
                if (code.includes('console.log')) {
                    const logCount = (code.match(/console\.log/g) || []).length;
                    response += `• 检测到 <b>${logCount}</b> 处 <code>console.log</code> 输出<br>`;
                }
                if (code.includes('function')) {
                    const fnCount = (code.match(/function\s+\w+/g) || []).length;
                    const arrowCount = (code.match(/=>/g) || []).length;
                    response += `• 包含 <b>${fnCount}</b> 个命名函数，<b>${arrowCount}</b> 处箭头函数<br>`;
                }
                if (code.includes('class ')) {
                    response += `• 使用了 <b>class</b> 语法定义类<br>`;
                }
                if (code.includes('for') || code.includes('while')) {
                    response += `• 包含循环结构（for/while）<br>`;
                }
                if (code.includes('if') || code.includes('else')) {
                    response += `• 包含条件判断<br>`;
                }
                if (code.includes('const ') || code.includes('let ') || code.includes('var ')) {
                    const constCount = (code.match(/\bconst\b/g) || []).length;
                    const letCount = (code.match(/\blet\b/g) || []).length;
                    response += `• 变量声明：const×${constCount}, let×${letCount}<br>`;
                }
                response +=
                    `<br>💡 <b>总体评估：</b>代码结构清晰，建议添加更多注释以便理解。你可以问我更具体的问题，比如某一行代码的作用。`;
                return response;
            }

            function checkForBugs(code, codeLower) {
                let issues = [];
                if (code.includes('==') && !code.includes('===') && !code.includes('!==')) {
                    issues.push('⚠️ 使用了 <code>==</code> 而非 <code>===</code>，可能导致类型强制转换的意外结果。');
                }
                if (codeLower.includes('var ') && (codeLower.includes('let ') || codeLower.includes('const '))) {
                    issues.push('💡 混合使用了 <code>var</code> 和 <code>let/const</code>，建议统一使用 <code>let</code> 和 <code>const</code>。');
                }
                if (code.includes('console.log') && code.includes('// console.log')) {
                    issues.push('📝 有被注释的调试语句，清理它们可以让代码更整洁。');
                }
                if (codeLower.includes('for(') && codeLower.includes('.length') && !codeLower.includes('cache')) {
                    issues.push('💡 循环中直接使用 <code>.length</code>，可以考虑缓存长度以提升微小的性能。');
                }
                if (code.includes('setTimeout') && code.includes('0')) {
                    issues.push('ℹ️ 使用 <code>setTimeout(fn, 0)</code> 会延迟到事件循环下一轮执行。');
                }
                if (issues.length === 0) {
                    issues.push('✅ 没有发现明显的bug。代码看起来不错！如果运行时出现错误，请把错误信息发给我。');
                }
                return '🐛 **代码检查结果：**<br><br>' + issues.join('<br>');
            }

            function suggestOptimizations(code, codeLower) {
                let suggestions = [];
                if (codeLower.includes('for') && codeLower.includes('.length') && codeLower.includes('i++')) {
                    suggestions.push(
                        '• 对于数组遍历，可以考虑使用 <code>forEach</code>、<code>map</code> 或 <code>for...of</code>，代码更简洁易读。');
                }
                if (codeLower.includes('+') && codeLower.includes('string') || code.includes("'") && code.includes('+')) {
                    suggestions.push('• 字符串拼接可以使用<b>模板字面量</b>（反引号 <code>`</code>），更直观。');
                }
                if (!codeLower.includes('try') && (codeLower.includes('json') || codeLower.includes('parse'))) {
                    suggestions.push('• 处理外部数据时建议使用 <code>try...catch</code> 包裹，防止解析失败。');
                }
                if (codeLower.includes('var ')) {
                    suggestions.push('• 将 <code>var</code> 替换为 <code>let</code> 或 <code>const</code>，获得块级作用域。');
                }
                if (suggestions.length === 0) {
                    suggestions.push('• 当前代码已经不错了！可以考虑添加JSDoc注释来提高可维护性。');
                    suggestions.push('• 如果有重复的逻辑，可以提取为独立函数。');
                }
                return '💡 **优化建议：**<br><br>' + suggestions.join('<br>');
            }

            function explainConcept(concept) {
                const knowledge = {
                    'closure': `📖 **闭包（Closure）**<br><br>
            闭包是指一个函数能够记住并访问其词法作用域，即使该函数在其词法作用域之外执行。<br><br>
            <b>示例：</b>
            <pre style="background:#1c1e2e;padding:8px;border-radius:6px;overflow-x:auto;">function createCounter() {
              let count = 0;
              return function() {
                count++;
                return count;
              };
            }
            const counter = createCounter();
            console.log(counter()); // 1
            console.log(counter()); // 2</pre>
            <b>关键点：</b>内部函数持有对外部变量 <code>count</code> 的引用，形成闭包。`,

                    'async': `📖 **异步编程 — Promise & async/await**<br><br>
            <b>Promise</b> 代表一个异步操作的最终结果。有三种状态：pending、fulfilled、rejected。<br><br>
            <b>async/await</b> 是Promise的语法糖，让异步代码看起来像同步代码：<br>
            <pre style="background:#1c1e2e;padding:8px;border-radius:6px;">async function fetchData() {
              const response = await fetch(url);
              const data = await response.json();
              return data;
            }</pre>
            <b>关键：</b><code>await</code> 只能在 <code>async</code> 函数内使用。`,

                    'array': `📖 **JavaScript数组方法**<br><br>
            常用方法：<br>
            • <code>map()</code> — 转换每个元素，返回新数组<br>
            • <code>filter()</code> — 筛选符合条件的元素<br>
            • <code>reduce()</code> — 累积计算<br>
            • <code>forEach()</code> — 遍历（无返回值）<br>
            • <code>find()</code> / <code>some()</code> / <code>every()</code> — 条件查找<br>
            • <code>sort()</code> — 排序<br>
            • <code>slice()</code> / <code>splice()</code> — 截取/删除`,

                    'object': `📖 **JavaScript对象**<br><br>
            对象是键值对的集合。现代JS支持：<br>
            • <b>解构：</b><code>const {name, age} = user;</code><br>
            • <b>展开：</b><code>const merged = {...obj1, ...obj2};</code><br>
            • <b>可选链：</b><code>user?.address?.city</code><br>
            • <b>Object.keys/values/entries</b> 遍历对象`,

                    'recursion': `📖 **递归**<br><br>
            函数调用自身来解决问题。经典例子——阶乘：<br>
            <pre style="background:#1c1e2e;padding:8px;border-radius:6px;">function factorial(n) {
              if (n <= 1) return 1;  // 基准条件
              return n * factorial(n - 1);  // 递归调用
            }</pre>
            <b>注意：</b>必须有基准条件防止无限递归，深度过大可能导致栈溢出。`,

                    'algorithm': `📖 **常见算法复杂度**<br><br>
            • O(1) — 常数时间（数组索引访问）<br>
            • O(log n) — 对数时间（二分查找）<br>
            • O(n) — 线性时间（遍历数组）<br>
            • O(n log n) — 线性对数（归并排序、快排）<br>
            • O(n²) — 平方时间（冒泡排序、嵌套循环）<br><br>
            <b>建议：</b>对于大数据集，尽量避免O(n²)算法。`
                };
                return knowledge[concept] || '📖 关于这个主题，我正在学习更多知识。你可以尝试换个方式提问！';
            }

            function generateGeneralResponse(question, code) {
                const responses = [
                    `🤔 这是个好问题！基于当前代码（${code.split('\n').length}行），我建议你尝试运行一下看看效果。如果遇到具体错误，把错误信息发给我，我可以帮你定位问题。`,
                    `💭 让我想想... 你的代码目前使用了${code.includes('function') ? '函数' : '基础语法'}。有什么具体方面需要我深入讲解的吗？比如变量作用域、异步处理或算法优化？`,
                    `📚 关于这个问题，建议你查看一下MDN文档。同时，当前代码中的${code.includes('console') ? '调试输出' : '逻辑'}可以帮助你理解执行流程。需要我详细解释某一部分吗？`,
                ];
                return responses[Math.floor(Math.random() * responses.length)];
            }

            function handleChatSend() {
                const question = domChatInput.value.trim();
                if (!question) return;
                addChatMessage('user', question);
                domChatInput.value = '';

                // 模拟思考延迟
                setTimeout(() => {
                    const response = generateAIResponse(question);
                    addChatMessage('ai', response);
                }, 600 + Math.random() * 800);
            }

            // ==================== 事件绑定 ====================
            $('#btnRun').addEventListener('click', runCode);
            $('#btnClearConsole').addEventListener('click', clearConsole);
            $('#btnToggleRight').addEventListener('click', () => {
                domRightPanel.classList.toggle('collapsed');
            });
            $('#btnToggleSidebar').addEventListener('click', () => {
                domSidebar.classList.toggle('collapsed');
            });

            // 编辑器标签切换
            domEditorTabs.addEventListener('click', (e) => {
                if (e.target.classList.contains('editor-tab')) {
                    activeTab = e.target.dataset.tab;
                    updateActiveTabUI();
                    updateEditorContent();
                    const modeMap = { 'html': 'htmlmixed', 'css': 'css', 'js': 'javascript' };
                    editorInstance.setOption('mode', modeMap[activeTab] || 'javascript');
                    updateStatusBar();
                    if (currentTemplate.mode === 'html' && activeRightPane === 'preview') {
                        runHTMLPreview();
                    }
                }
            });

            // 右侧面板切换
            $('#rightPanel').querySelector('.right-panel-header').addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-btn')) {
                    switchRightPane(e.target.dataset.pane);
                }
            });

            // AI聊天
            $('#chatSendBtn').addEventListener('click', handleChatSend);
            domChatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleChatSend();
                }
            });

            // 快捷提问
            $('#quickActions').addEventListener('click', (e) => {
                if (e.target.classList.contains('quick-chip')) {
                    const q = e.target.dataset.q;
                    domChatInput.value = q + '（参考当前编辑器中的代码）';
                    switchRightPane('ai');
                    domChatInput.focus();
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    runCode();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    showToast('💾 代码已暂存（浏览器本地）', 'success');
                    localStorage.setItem('lab-last-code', getCurrentCode());
                    localStorage.setItem('lab-last-template', currentTemplate.id);
                }
            });

            // ==================== 初始化 ====================
            function init() {
                renderTemplateList();
                updateEditorTabsVisibility();
                initEditor();
                updateActiveTabUI();
                updateStatusBar();

                // 恢复上次的代码（如果有）
                const savedTemplateId = localStorage.getItem('lab-last-template');
                if (savedTemplateId) {
                    const savedTpl = templates.find(t => t.id === savedTemplateId);
                    if (savedTpl) {
                        selectTemplate(savedTpl);
                        const savedCode = localStorage.getItem('lab-last-code');
                        if (savedCode && editorInstance) {
                            editorInstance.setValue(savedCode);
                            updateStatusBar();
                        }
                    }
                }

                // 初始预览
                if (currentTemplate.mode === 'html') {
                    runHTMLPreview();
                }

                // 初始状态
                switchRightPane('preview');
                updateStatusBar();

                console.log('🔬 AI编程实验室已就绪！');
                console.log('  📁 左侧选择实验模板');
                console.log('  ✏️ 中央编辑代码');
                console.log('  ▶ 点击运行按钮或按 Ctrl+Enter');
                console.log('  🤖 右侧AI助手可帮你学习编程');
                console.log('  💡 试试点击AI面板的快捷按钮！');
            }

            // 窗口大小变化时刷新编辑器
            window.addEventListener('resize', () => {
                if (editorInstance) editorInstance.refresh();
            });

            // 启动
            init();

            // 暴露API到全局
            window.LabAPI = {
                runCode,
                clearConsole,
                selectTemplate: (id) => {
                    const tpl = templates.find(t => t.id === id);
                    if (tpl) selectTemplate(tpl);
                },
                getCurrentCode,
                getTemplates: () => templates,
                switchRightPane,
                addChatMessage,
            };

            console.log('💡 可通过 window.LabAPI 访问实验室API');
        })();
    </script>
</body>
</html>
