<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库实验室 | AI 助教</title>
  <!-- CodeMirror CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui; background: #1e1e2e; color: #cdd6f4; display: flex; height: 100vh; }
    .main-panel { flex: 1; display: flex; flex-direction: column; padding: 20px; }
    .ai-panel { width: 350px; background: #181825; border-left: 1px solid #313244; display: flex; flex-direction: column; }
    h2 { color: #cba6f7; margin-bottom: 10px; }
    .editor-container { border-radius: 8px; overflow: hidden; border: 1px solid #45475a; }
    #editor { height: 180px; font-size: 15px; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 10px 0; align-self: flex-start; }
    button:hover { background: #74c7ec; }
    .output-area { flex: 1; overflow: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th { background: #45475a; padding: 8px; text-align: left; }
    td { padding: 6px 8px; border-bottom: 1px solid #313244; }
    .error { color: #f38ba8; background: #2e1e1e; padding: 10px; border-radius: 6px; margin-top: 10px; }
    .info { color: #a6e3a1; margin-top: 5px; }

    .ai-panel { padding: 15px; }
    .ai-chat-box { flex: 1; overflow-y: auto; margin-bottom: 10px; background: #1e1e2e; border-radius: 8px; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; line-height: 1.4; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; }
    .msg.assistant { align-self: flex-start; background: #313244; }
    #ai-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; resize: none; height: 60px; font-family: inherit; }
    .api-key-hint { font-size: 12px; color: #6c7086; margin-top: 5px; }
    .api-key-hint a { color: #89b4fa; }
  </style>
</head>
<body>
  <div class="main-panel">
    <h2>🧪 数据库实验室</h2>
    <div class="editor-container">
      <textarea id="editor">SELECT * FROM users;</textarea>
    </div>
    <div>
      <button onclick="runSQL()">▶ 执行 SQL</button>
      <button onclick="resetDB()" style="background: #f38ba8; margin-left: 10px;">🔄 重置数据库</button>
    </div>
    <div class="output-area" id="output">
      <div class="info">请点击“执行 SQL”查看结果，或尝试 INSERT / UPDATE 等操作。</div>
    </div>
  </div>

  <div class="ai-panel">
    <h2>🤖 AI 助教</h2>
    <div class="ai-chat-box" id="ai-chat-box">
      <div class="msg assistant">你好！我是你的 SQL 助教。你可以问我如何写查询、优化语句，或者让我解释错误信息。</div>
    </div>
    <textarea id="ai-input" placeholder="例如：帮我写一个查询，找出下过订单超过2次的用户"></textarea>
    <button onclick="askAI()" style="align-self: flex-end;">发送</button>
    <div class="api-key-hint">
      ⚠️ AI 需要你的 OpenAI API Key（<a href="https://platform.openai.com/api-keys" target="_blank">获取 Key</a>）。<br>
      <input id="api-key" type="password" placeholder="sk-..." style="width: 100%; padding: 6px; margin-top: 4px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: #cdd6f4;">
    </div>
  </div>

  <!-- 依赖 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>

  <script>
    // ---------- 初始化 SQL.js ----------
    let db;
    const initSQL = async () => {
      const SQL = await initSqlJs({
        locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
      });
      db = new SQL.Database();
      // 创建示例表和数据
      db.run(`
        CREATE TABLE users (
          id INTEGER PRIMARY KEY,
          name TEXT NOT NULL,
          email TEXT UNIQUE NOT NULL,
          registered_at TEXT DEFAULT CURRENT_TIMESTAMP
        );
        CREATE TABLE orders (
          id INTEGER PRIMARY KEY,
          user_id INTEGER REFERENCES users(id),
          product TEXT,
          amount REAL,
          created_at TEXT DEFAULT CURRENT_TIMESTAMP
        );
        INSERT INTO users (name, email) VALUES
          ('Alice', 'alice@example.com'),
          ('Bob', 'bob@example.com'),
          ('Carol', 'carol@example.com');
        INSERT INTO orders (user_id, product, amount) VALUES
          (1, 'Laptop', 1200),
          (1, 'Mouse', 25),
          (2, 'Keyboard', 75),
          (3, 'Monitor', 300),
          (3, 'Webcam', 60),
          (3, 'Desk Lamp', 40);
      `);
    };

    // ---------- SQL 编辑器 ----------
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'text/x-sql',
      theme: 'material-darker',
      lineNumbers: true,
      lineWrapping: true,
      autofocus: true
    });

    // ---------- 运行 SQL ----------
    function runSQL() {
      const sql = editor.getValue().trim();
      const output = document.getElementById('output');
      if (!sql) {
        output.innerHTML = '<div class="error">请输入 SQL 语句。</div>';
        return;
      }
      if (!db) {
        output.innerHTML = '<div class="error">数据库未初始化，请稍后再试。</div>';
        return;
      }
      try {
        const results = db.exec(sql);
        if (!results.length) {
          // 可能是 INSERT/UPDATE/DELETE 等无结果集语句
          output.innerHTML = '<div class="info">✅ 语句执行成功，没有返回结果。</div>';
        } else {
          // 构建表格
          let html = '';
          for (const result of results) {
            const { columns, values } = result;
            let tableHtml = '<table><thead><tr>';
            columns.forEach(col => tableHtml += `<th>${col}</th>`);
            tableHtml += '</tr></thead><tbody>';
            values.forEach(row => {
              tableHtml += '<tr>';
              row.forEach(cell => tableHtml += `<td>${cell}</td>`);
              tableHtml += '</tr>';
            });
            tableHtml += '</tbody></table>';
            html += tableHtml;
          }
          output.innerHTML = html;
        }
      } catch (err) {
        output.innerHTML = `<div class="error">❌ 错误：${err.message}</div>`;
      }
    }

    // ---------- 重置数据库 ----------
    async function resetDB() {
      if (db) db.close();
      await initSQL();
      document.getElementById('output').innerHTML = '<div class="info">🔄 数据库已重置，恢复为示例数据。</div>';
    }

    // ---------- AI 模块 ----------
    function getAPIKey() {
      return document.getElementById('api-key').value.trim();
    }

    async function askAI() {
      const apiKey = getAPIKey();
      if (!apiKey) {
        alert('请先在侧边栏底部输入你的 OpenAI API Key。');
        return;
      }
      const chatBox = document.getElementById('ai-chat-box');
      const input = document.getElementById('ai-input');
      const question = input.value.trim();
      if (!question) return;

      // 显示用户消息
      chatBox.innerHTML += `<div class="msg user">${escapeHTML(question)}</div>`;
      input.value = '';

      // 添加助教占位消息
      const assistantMsg = document.createElement('div');
      assistantMsg.className = 'msg assistant';
      assistantMsg.textContent = '思考中…';
      chatBox.appendChild(assistantMsg);
      chatBox.scrollTop = chatBox.scrollHeight;

      // 构建 context：包含当前数据库模式 + 用户 SQL 编辑器内容
      let schema = '';
      try {
        const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;");
        if (tables.length) {
          schema = '当前数据库包含以下表：\n';
          tables[0].values.forEach(row => {
            const tableName = row[0];
            schema += `- ${tableName}`;
            const cols = db.exec(`PRAGMA table_info(${tableName});`);
            if (cols.length) {
              const columns = cols[0].values.map(v => `${v[1]} (${v[2]})`).join(', ');
              schema += ` (${columns})`;
            }
            schema += '\n';
          });
        }
      } catch (e) { /* 忽略 */ }

      const currentSQL = editor.getValue().trim();
      const systemPrompt = `你是一个友好的数据库助教。根据当前数据库结构和用户问题，提供 SQL 帮助。
      如果用户要求写查询，请提供可直接运行的 SQL 代码并简要解释。对于错误，请指出可能的原因并给出修正建议。
      当前数据库模式：
      ${schema || '无'}
      用户编辑器中的 SQL：${currentSQL || '空'}`;

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-3.5-turbo',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: question }
            ],
            temperature: 0.3,
            max_tokens: 800
          })
        });
        const data = await response.json();
        if (data.error) {
          assistantMsg.textContent = `API 错误：${data.error.message}`;
        } else {
          assistantMsg.textContent = data.choices[0].message.content;
        }
      } catch (err) {
        assistantMsg.textContent = `请求失败：${err.message}`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // 监听 Enter 发送（Shift+Enter 换行）
    document.getElementById('ai-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAI();
      }
    });

    // ---------- 启动 ----------
    initSQL().then(() => {
      document.getElementById('output').innerHTML = '<div class="info">✅ 数据库已就绪，包含 users 和 orders 示例表。试试 SELECT * FROM users;</div>';
    });
  </script>
</body>
</html>
